<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario con Temporizador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="contenedor">
        <div class="temporizador">
            Tiempo restante: <span id="tiempo">30</span>s
        </div>

        <div id="area-quiz">
            <h2 id="pregunta">Cargando pregunta...</h2>
            <div id="opciones" class="botones-opciones">
                </div>
        </div>

        <div id="area-resultado" style="display: none;">
            <h2>¡Tiempo agotado o completado!</h2>
            <p>Tu puntuación es: <span id="puntuacion">0</span> de 6</p>
            <button id="btn-reiniciar" class="btn">Volver a jugar</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
